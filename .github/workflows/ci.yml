name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify client, Convex, and Chromium gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
      VITE_CLERK_PUBLISHABLE_KEY: "pk_test_Y2xlcmsudGVzdCQ="
      VITE_CONVEX_URL: "https://route-ledger-ci.convex.cloud"
      VITE_APP_URL: "https://route-ledger-ci.example"
      VITE_SENTRY_DSN: ""
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run client checks and production build
        run: bun run check

      - name: Smoke-test production artifact
        run: bun run test:build-smoke

      - name: Run Convex tests
        run: bun run test:convex

      - name: Install Chromium and Linux dependencies
        run: bun run test:e2e:install:ci

      - name: Run deterministic Chromium journeys
        run: bun run test:e2e
